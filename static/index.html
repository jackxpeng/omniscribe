<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OmniScribe Process Manager</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; max-width: 800px; margin: auto; background: #f4f4f5; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }
        #telemetry { display: none; margin-top: 1rem; padding: 1rem; background: #1e293b; color: #38bdf8; border-radius: 4px; font-family: monospace; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ask OmniScribe</h2>
        <input type="text" id="queryInput" value="Who is writing the outbox publisher?" style="width: 80%; padding: 8px;">
        <button id="extractBtn" onclick="runExtraction()">Extract Actions</button>
        
        <div id="telemetry">
            <strong>Engine Status:</strong> <span id="status">Idle</span><br>
            <strong>Tokens Decoded:</strong> <span id="tokens">0</span><br>
            <strong>Live State:</strong> <pre id="rawState">Waiting...</pre>
        </div>
    </div>

    <div class="card">
        <h2>Action Items</h2>
        <pre id="results">No tasks extracted yet.</pre>
    </div>

    <div class="card">
        <h2>Process Manager Execution</h2>
        <button id="execBtn" onclick="runExecution()" style="background: #10b981;">Execute Pending Tasks</button>
        <pre id="execResults">Awaiting command...</pre>
    </div>

    <script>
        async function runExtraction() {
            const btn = document.getElementById('extractBtn');
            const query = document.getElementById('queryInput').value;
            const telemetryBox = document.getElementById('telemetry');
            const resultsBox = document.getElementById('results');
            
            btn.disabled = true;
            telemetryBox.style.display = 'block';
            resultsBox.innerText = "Thinking...";

            // 1. OPEN THE OBSERVABILITY CHANNEL (SSE)
            // This connects to your background generator loop in FastAPI
            const evtSource = new EventSource('/stream_slots');
            
            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // If the engine returns an array of slots, grab the active one
                if (Array.isArray(data) && data.length > 0) {
                    // Dynamically find the first slot that is actively processing, or fall back to slot 0
                    const activeSlot = data.find(slot => slot.is_processing === true) || data[0]; 

                    const isBusy = activeSlot.is_processing === true;
                    
                    // Llama.cpp stores the active generation's token count in the next_token array
                    const tokensDecoded = (activeSlot.next_token && activeSlot.next_token[0] && activeSlot.next_token[0].n_decoded) 
                        || activeSlot.n_decoded 
                        || 0;

                    document.getElementById('status').innerText = isBusy ? "Processing" : "Idle";
                    document.getElementById('tokens').innerText = tokensDecoded;
                    document.getElementById('rawState').innerText = JSON.stringify(activeSlot, null, 2);
                }
            };

            // 2. TRIGGER THE EXECUTION CHANNEL (REST API)
            try {
                const response = await fetch('/extract_actions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                
                const result = await response.json();
                resultsBox.innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                resultsBox.innerText = "Error: " + error.message;
            } finally {
                // 3. THE CONVERGENCE
                // Once the POST request finishes, close the SSE connection and reset the UI
                evtSource.close();
                document.getElementById('status').innerText = "Complete";
                btn.disabled = false;
            }
        }

        async function runExecution() {
            const btn = document.getElementById('execBtn');
            const resultsBox = document.getElementById('execResults');
            
            btn.disabled = true;
            resultsBox.innerText = "Sweeping database and calling external APIs...";

            try {
                const response = await fetch('/execute_tasks', { method: 'POST' });
                const result = await response.json();
                resultsBox.innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                resultsBox.innerText = "Error: " + error.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
